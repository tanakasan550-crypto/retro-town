<!DOCTYPE html>
<html lang="ja">
<head>

<title>山崎ラーメン</title>

<style>

  margin: 0;
  color: #3a2e1f;

/* ヘッダー */
.header {
  background: #7a1f1f;

}

.hero img {

}

}

<body>

<div class="header">
山崎ラーメン
</div>

<div class="hero">

</div>

</div>

<div class="item">
<img src="ramen2.jpg">

</div>
