<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日立レトロ横丁 ｜ 昭和三十年の商店街</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --cream:#f5ead6;
  --paper:#ede0c4;
  --ink:#2a1a0e;
  --red:#9b1c1c;
  --gold:#c8922a;
  --dark:#140d08;
  --night:#0e0905;
  --lantern:#e8661a;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--dark);
  color:var(--cream);
  font-family:'Noto Sans JP',sans-serif;
}

/* ===== HERO（元デザイン維持）===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero h1{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(3rem,8vw,6rem);
}

/* ===== 桜ゾーン ===== */
.sakura-zone{
  padding:100px 20px;
  text-align:center;
}

/* ===== 追加① 人気店舗 ===== */
.featured{
  background:linear-gradient(180deg,#110905,#1a0d06);
  padding:80px 32px;
  text-align:center;
}
.featured-grid{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:40px;
}
.featured-card{
  background:#1c0f08;
  border:1px solid rgba(200,146,42,0.2);
  padding:20px 30px;
  color:var(--cream);
  text-decoration:none;
  font-family:'Noto Serif JP',serif;
  transition:.3s;
}
.featured-card:hover{
  border-color:var(--gold);
  background:#241408;
}

/* ===== 追加② マップ ===== */
.map-section{
  padding:80px 32px;
  text-align:center;
}
.map-container{
  position:relative;
  max-width:900px;
  margin:auto;
}
.map-img{
  width:100%;
}
.map-pin{
  position:absolute;
  transform:translate(-50%,-50%);
  background:var(--red);
  color:#fff;
  padding:6px 12px;
  font-size:12px;
  border-radius:4px;
  text-decoration:none;
}
.map-pin:hover{
  background:#c22828;
  transform:translate(-50%,-50%) scale(1.1);
}

/* ===== 商店街（元デザイン簡略維持）===== */
.shotengai{
  padding:80px 20px;
}
.shops-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:10px;
}
.shop-card{
  border:1px solid rgba(200,146,42,0.2);
  padding:20px;
  text-decoration:none;
  color:var(--cream);
  background:#1c0f08;
}
.shop-card:hover{
  border-color:var(--gold);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>日立レトロ横丁</h1>
</section>

<!-- 桜 -->
<section class="sakura-zone">
  <h2>春になれば、この通りは桜で埋まる。</h2>
</section>

<!-- 人気店舗 -->
<section class="featured">
  <h2>まずはここから</h2>
  <div class="featured-grid">
    <a href="ramen.html" class="featured-card">山崎ラーメン</a>
    <a href="kissaten.html" class="featured-card">喫茶ひかり</a>
    <a href="yakitori.html" class="featured-card">焼き鳥たかし</a>
  </div>
</section>

<!-- マップ -->
<section class="map-section">
  <h2>街を歩く</h2>

  <div class="map-container">
    <img src="map.jpg" class="map-img">

    <a href="ramen.html" class="map-pin" style="top:62%;left:28%;">ラーメン</a>
    <a href="kissaten.html" class="map-pin" style="top:55%;left:48%;">喫茶</a>
    <a href="yakitori.html" class="map-pin" style="top:66%;left:70%;">焼鳥</a>
  </div>
</section>

<!-- 商店街 -->
<section class="shotengai">
  <h2>商店街</h2>

  <div class="shops-grid">
    <a href="ramen.html" class="shop-card">山崎ラーメン</a>
    <a href="kissaten.html" class="shop-card">喫茶ひかり</a>
    <a href="yakitori.html" class="shop-card">焼き鳥たかし</a>
    <a href="#" class="shop-card">八百屋たなか</a>
  </div>
</section>

</body>
</html>
